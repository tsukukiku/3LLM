<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一问三知</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>一问三知</h1>
      <p class="navline">
        API 版
        <a href="./web.html">打开网页版手动版</a>
        <a href="./browser.html">打开四分屏浏览器</a>
      </p>
      <div class="grid">
        <section class="card">
          <h2>提问区</h2>
          <textarea id="question" placeholder="输入你的问题..."></textarea>
          <div id="questionMeta" class="meta">0 / 99 字</div>
          <div class="actions">
            <input id="accessCode" class="code-input" type="password" autocomplete="off" placeholder="口令" />
            <button id="askBtn">提交用户提问</button>
            <button id="exportBtn" class="export-btn" type="button">导出问答TXT</button>
            <button id="clearBtn" type="button">清空</button>
          </div>
          <p class="muted">API 模式会调用后端；网页版模式会打开官方网页手动提问。</p>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>GPT</h2>
            <div class="mode-row" data-provider="gpt">
              <label><input type="radio" name="mode-gpt" value="api" checked /> API</label>
              <label><input type="radio" name="mode-gpt" value="web" /> 网页</label>
            </div>
          </div>
          <div id="gpt" class="output muted">等待提问...</div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>Gemini</h2>
            <div class="mode-row" data-provider="gemini">
              <label><input type="radio" name="mode-gemini" value="api" /> API</label>
              <label><input type="radio" name="mode-gemini" value="web" checked /> 网页</label>
            </div>
          </div>
          <div id="gemini" class="output muted">等待提问...</div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>Grok</h2>
            <div class="mode-row" data-provider="grok">
              <label><input type="radio" name="mode-grok" value="api" /> API</label>
              <label><input type="radio" name="mode-grok" value="web" checked /> 网页</label>
            </div>
          </div>
          <div id="grok" class="output muted">等待提问...</div>
        </section>
      </div>
    </div>

    <script src="./app.js?v=20260520-access-code"></script>
  </body>
</html>

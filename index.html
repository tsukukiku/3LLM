<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一问三知</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/site-icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/site-icon-192.png" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./style.css?v=20260521-passcode" />
  </head>
  <body>
    <main class="browser">
      <section class="app">
        <header class="hero">
          <img class="site-logo" src="./assets/site-icon-64.png" alt="一问三知" />
          <div class="hero-copy">
            <div class="hero-title-line">
              <h1>一问三知</h1>
              <strong>三AI行，必有我师</strong>
            </div>
            <p>同时向三大 AI 提问，比较不同模型的回答，取长补短，启发思考。</p>
          </div>
        </header>

        <section class="stack">
          <article class="card question-card">
            <div class="card-inner">
              <div class="section-head">
                <div class="section-title">
                  <span class="icon-badge">?</span>
                  <span>提出你的问题</span>
                  <em>每IP每天5问</em>
                </div>
                <span id="status"></span>
              </div>
              <div class="textarea-wrap">
                <textarea id="question" maxlength="200" placeholder="输入你的问题..."></textarea>
                <span class="count" id="count">0 / 200 字</span>
              </div>
              <div class="actions">
                <input id="passcode" class="passcode" type="password" placeholder="口令" autocomplete="off" />
                <button id="askBtn" class="primary" type="button">✦ 提交问题</button>
                <button id="clearBtn" class="secondary" type="button">清空</button>
                <button id="exportBtn" class="export" type="button">下载 TXT</button>
              </div>
              <p class="helper">将问题与三位 AI 的回答整合在一起，支持 TXT 格式下载。</p>
            </div>
          </article>

          <article class="card response-card chatgpt-card">
            <div class="card-inner">
              <div class="model-head">
                <div class="model-title">
                  <img src="./assets/chatgpt-32.png" alt="" />
                  <h2>ChatGPT</h2>
                </div>
                <span id="gptState"></span>
              </div>
              <div id="gpt" class="answer muted">提交问题后，这里会显示 ChatGPT 的纯文本回答。文字较多时可上下滚动查看。</div>
            </div>
          </article>

          <article class="card response-card grok-card">
            <div class="card-inner">
              <div class="model-head">
                <div class="model-title">
                  <img src="./assets/grok-32.png" alt="" />
                  <h2>Grok</h2>
                </div>
                <span id="grokState"></span>
              </div>
              <div id="grok" class="answer muted">提交问题后，这里会显示 Grok 的纯文本回答。文字较多时可上下滚动查看。</div>
            </div>
          </article>

          <article class="card response-card gemini-card">
            <div class="card-inner">
              <div class="model-head">
                <div class="model-title">
                  <img src="./assets/gemini-32.png" alt="" />
                  <h2>Gemini</h2>
                </div>
                <span id="geminiState"></span>
              </div>
              <div id="gemini" class="answer muted">提交问题后，这里会显示 Gemini 的纯文本回答。文字较多时可上下滚动查看。</div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="./app.js?v=20260521-passcode"></script>
  </body>
</html>

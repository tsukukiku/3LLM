<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一问三知 API 四窗口</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>一问三知</h1>
          <p>一个提问，同时请求 GPT、Gemini、Grok。</p>
        </div>
        <button id="exportBtn" type="button">导出 TXT</button>
      </header>

      <section class="grid">
        <article class="panel ask-panel">
          <div class="panel-head">
            <h2>用户提问</h2>
            <span id="status">待提问</span>
          </div>
          <textarea id="question" placeholder="输入问题，然后点击“一问三知”"></textarea>
          <div class="actions">
            <button id="askBtn" type="button">一问三知</button>
            <button id="clearBtn" class="secondary" type="button">清空</button>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>GPT</h2>
            <span id="gptState">等待</span>
          </div>
          <div id="gpt" class="answer muted">等待提问...</div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Gemini</h2>
            <span id="geminiState">等待</span>
          </div>
          <div id="gemini" class="answer muted">等待提问...</div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Grok</h2>
            <span id="grokState">等待</span>
          </div>
          <div id="grok" class="answer muted">等待提问...</div>
        </article>
      </section>
    </main>

    <script src="./app.js?v=20260520-api4"></script>
  </body>
</html>

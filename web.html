<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一问三知</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>一问三知</h1>
      <p class="navline">
        手动网页版
        <a href="./index.html">返回混合版</a>
      </p>
      <div class="grid">
        <section class="card">
          <h2>用户提问</h2>
          <textarea id="question" placeholder="输入你的问题..."></textarea>
          <div class="actions">
            <button id="copyBtn">复制用户提问</button>
            <button id="openAllBtn" type="button">打开三家网页</button>
            <button id="clearBtn" type="button">清空</button>
          </div>
          <p id="status" class="muted">这个版本不调用 API，也不自动读取网页版回答。</p>
        </section>

        <section class="card">
          <h2>GPT</h2>
          <div class="output muted">复制用户提问后，在官方网页粘贴发送。</div>
          <a class="provider-link" href="https://chatgpt.com/" target="_blank" rel="noreferrer">打开 ChatGPT</a>
        </section>

        <section class="card">
          <h2>Gemini</h2>
          <div class="output muted">复制用户提问后，在官方网页粘贴发送。</div>
          <a class="provider-link" href="https://gemini.google.com/" target="_blank" rel="noreferrer">打开 Gemini</a>
        </section>

        <section class="card">
          <h2>Grok</h2>
          <div class="output muted">复制用户提问后，在官方网页粘贴发送。</div>
          <a class="provider-link" href="https://grok.com/" target="_blank" rel="noreferrer">打开 Grok</a>
        </section>
      </div>
    </div>

    <script src="./web.js?v=20260520-ywzz"></script>
  </body>
</html>
